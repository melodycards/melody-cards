<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Melody Cards Admin</title>
    <link rel="stylesheet" href="../styles.css?v=20260709-config-sections" />
    <link rel="stylesheet" href="admin.css?v=20260709-config-sections" />
  </head>
  <body class="admin-body" data-admin="true">
    <main class="admin-shell">
      <section class="admin-login" data-login>
        <div>
          <p class="eyebrow">Melody Cards CMS</p>
          <h1>Website bearbeiten</h1>
          <p>Alle Inhalte, Medien, Farben, Typografie und Rechtstexte werden aus Supabase geladen und gespeichert.</p>
        </div>
        <form id="admin-login-form" data-login-form>
          <label>E-Mail<input type="email" name="email" value="koglu@hotmail.de" required /></label>
          <label>Passwort<input type="password" name="password" required /></label>
          <button class="btn btn-primary" type="submit">Einloggen</button>
          <button class="btn btn-glass" type="button" data-demo-admin>Demo öffnen</button>
          <p class="form-status" data-login-status></p>
        </form>
      </section>

      <section class="admin-app" data-admin-app hidden>
        <aside class="admin-sidebar">
          <strong>Melody CMS</strong>
          <button data-section="dashboard" class="is-active">Dashboard</button>
          <button data-section="visual">Website visuell bearbeiten</button>
          <button data-section="brand">Logo & Brand</button>
          <button data-section="theme">Design</button>
          <button data-section="seo">SEO</button>
          <button data-section="categories">Kategorien</button>
          <button data-section="products">Produkte</button>
          <button data-section="gallery">Galerie</button>
          <button data-section="reviews">Bewertungen</button>
          <button data-section="faqs">FAQ</button>
          <button data-section="orderform">Bestellformular</button>
          <button data-section="contact">Kontakt</button>
          <button data-section="legal">Rechtliches</button>
          <button data-section="media">Medien verwalten</button>
          <button data-section="orders">Bestellungen</button>
          <a class="btn btn-glass" href="../index.html" target="_blank">Website öffnen</a>
          <button class="btn btn-primary" type="button" data-logout>Logout</button>
        </aside>

        <div class="admin-main">
          <header class="admin-top">
            <div>
              <p class="eyebrow" data-mode-label>Supabase CMS</p>
              <h2 data-admin-title>Dashboard</h2>
            </div>
            <p class="form-status" data-admin-status></p>
          </header>

          <section class="admin-panel is-active" data-panel="dashboard"></section>
          <section class="admin-panel" data-panel="visual"></section>
          <section class="admin-panel" data-panel="brand"></section>
          <section class="admin-panel" data-panel="theme"></section>
          <section class="admin-panel" data-panel="seo"></section>
          <section class="admin-panel" data-panel="translations"></section>
          <section class="admin-panel" data-panel="navigation"></section>
          <section class="admin-panel" data-panel="sections"></section>
          <section class="admin-panel" data-panel="categories"></section>
          <section class="admin-panel" data-panel="products"></section>
          <section class="admin-panel" data-panel="gallery"></section>
          <section class="admin-panel" data-panel="reviews"></section>
          <section class="admin-panel" data-panel="faqs"></section>
          <section class="admin-panel" data-panel="orderform"></section>
          <section class="admin-panel" data-panel="contact"></section>
          <section class="admin-panel" data-panel="legal"></section>
          <section class="admin-panel" data-panel="media"></section>
          <section class="admin-panel" data-panel="orders"></section>
          <section class="admin-panel" data-panel="database"></section>
        </div>
      </section>
    </main>

    <script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js?v=20260709-config-sections"></script>
    <script src="../languages.js?v=20260709-config-sections"></script>
    <script src="../site-data.js?v=20260709-config-sections"></script>
    <script src="../supabase-client.js?v=20260709-config-sections"></script>
    <script src="admin.js?v=20260709-config-sections"></script>
  </body>
</html>
